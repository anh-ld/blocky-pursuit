<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Blocky Pursuit</title>
        <link rel="stylesheet" href="./src/uno.css" />
        <style>
            body {
                margin: 0;
                overflow: hidden;
                background: #000;
            }
            canvas {
                display: block;
            }
        </style>
    </head>
    <body class="w-screen h-screen font-sans select-none">
        <div
            id="ui-layer"
            class="absolute inset-0 pointer-events-none flex flex-col justify-center items-center z-10"
        >
            <div
                id="score-display"
                class="absolute top-5 left-5 text-amber-400 text-lg font-semibold tracking-widest hidden"
            >
                00:00
            </div>

            <div id="start-screen" class="panel panel-visible">
                <h1
                    class="text-orange-500 text-3xl font-extrabold leading-relaxed m-0 mb-2 uppercase tracking-widest"
                >
                    BLOCKY<br />PURSUIT
                </h1>
                <p
                    class="text-gray-400 text-sm mb-6 uppercase font-bold tracking-wider"
                >
                    Evade the police
                </p>
                <div class="flex justify-center gap-2 mb-6">
                    <div class="kbd">W</div>
                    <div class="kbd">A</div>
                    <div class="kbd">S</div>
                    <div class="kbd">D</div>
                </div>
                <button id="start-btn" class="btn-cta">START</button>
            </div>

            <div id="game-over-screen" class="panel">
                <h1
                    class="text-red-400 text-3xl font-extrabold m-0 mb-2 uppercase tracking-widest"
                >
                    BUSTED
                </h1>
                <p class="text-gray-400 text-sm uppercase mb-1 font-bold">
                    Survived
                </p>
                <div
                    id="final-score"
                    class="text-amber-400 text-2xl font-extrabold m-0 mb-6 tracking-widest"
                >
                    00:00
                </div>
                <button id="restart-btn" class="btn-danger">RETRY</button>
            </div>
        </div>
        <script type="module" src="./src/main.ts"></script>
    </body>
</html>
