<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
        />
        <title>Blocky Pursuit</title>
        <meta name="theme-color" content="#111827" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <link rel="apple-touch-icon" href="/icon.png" />
        <style>
            button {
                outline: none !important;
                -webkit-tap-highlight-color: transparent;
            }
            button:focus,
            button:focus-visible {
                outline: none !important;
                box-shadow: none !important;
            }
            @keyframes game-over-in {
                0% {
                    opacity: 0;
                    transform: translateY(24px) scale(0.94);
                }
                60% {
                    opacity: 1;
                    transform: translateY(-2px) scale(1.01);
                }
                100% {
                    opacity: 1;
                    transform: translateY(0) scale(1);
                }
            }
            .animate-game-over-in {
                animation: game-over-in 320ms cubic-bezier(0.16, 1, 0.3, 1) both;
            }
        </style>
    </head>
    <body
        class="w-screen h-dvh font-sans select-none m-0 overflow-hidden bg-black"
    >
        <!-- Static form for Netlify form detection at build time -->
        <form name="feedback" netlify hidden>
            <textarea name="message"></textarea>
        </form>

        <div id="app" class="w-full h-full flex flex-col"></div>

        <script type="module" src="./src/main.ts"></script>
    </body>
</html>
